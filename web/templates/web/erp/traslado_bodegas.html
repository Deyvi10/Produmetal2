{% extends 'web/base.html' %}
{% load static %}

{% block content %}
<div class="container py-4">
    <div class="d-flex align-items-center mb-4">
        <a href="{% url 'inventario_actual' %}" class="btn btn-outline-secondary rounded-circle me-3" style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div>
            <h4 class="mb-0 fw-bold">Trasladar Material</h4>
            <p class="text-muted mb-0 small">Módulo de Logística Interna</p>
        </div>
    </div>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            
            <div class="alert alert-info d-flex align-items-center rounded-3 mb-4" role="alert">
                <i class="fas fa-box-open fs-3 me-3"></i>
                <div>
                    <h6 class="mb-0 fw-bold">{{ material.nombre }}</h6>
                    <span class="badge bg-secondary">SKU: {{ material.sku }}</span>
                </div>
            </div>

            <form method="POST" action="{% url 'trasladar_material' material.id %}">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="bodega_origen" class="form-label fw-semibold">
                        <i class="fas fa-sign-out-alt text-danger me-1"></i> Sacar de (Origen):
                    </label>
                    <select class="form-select form-select-lg shadow-none" name="bodega_origen" id="bodega_origen" required>
                        <option value="" selected disabled>Selecciona tu bodega...</option>
                        {% for bodega in bodegas_origen %}
                            <option value="{{ bodega.id }}">{{ bodega.nombre }}</option>
                        {% empty %}
                            <option value="" disabled>No tienes bodegas asignadas</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="text-center my-2 text-muted">
                    <i class="fas fa-arrow-down fs-4"></i>
                </div>

                <div class="mb-4">
                    <label for="bodega_destino" class="form-label fw-semibold">
                        <i class="fas fa-sign-in-alt text-success me-1"></i> Enviar a (Destino):
                    </label>
                    <select class="form-select form-select-lg shadow-none" name="bodega_destino" id="bodega_destino" required>
                        <option value="" selected disabled>Selecciona el destino...</option>
                        {% for bodega in bodegas_destino %}
                            <option value="{{ bodega.id }}">{{ bodega.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <hr class="my-4 text-muted">

                <div class="mb-3">
                    <label for="cantidad" class="form-label fw-semibold text-primary">Cantidad a Mover:</label>
                    <div class="input-group input-group-lg shadow-sm">
                        <input type="number" step="0.01" min="0.01" class="form-control text-end fw-bold fs-4" name="cantidad" id="cantidad" placeholder="0.00" inputmode="decimal" required>
                        <span class="input-group-text bg-light text-muted">Unidades</span>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="observaciones" class="form-label fw-semibold">Observaciones <span class="text-muted fw-normal">(Opcional)</span>:</label>
                    <textarea class="form-control" name="observaciones" id="observaciones" rows="2" placeholder="Ej: Traslado urgente para obra..."></textarea>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg rounded-3 fw-bold shadow-sm py-3" onclick="this.disabled=true; this.form.submit();">
                        <i class="fas fa-truck me-2"></i> Confirmar Traslado
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    /* Ajustes específicos para móviles */
    @media (max-width: 576px) {
        .card-body {
            padding: 1.25rem !important;
        }
        .form-select-lg, .input-group-lg > .form-control, .btn-lg {
            font-size: 1.1rem; /* Textos suficientemente grandes para tocar */
            min-height: 55px;  /* Altura mínima para el área táctil */
        }
    }
    
    /* Prevenir zoom automático en iOS al tocar un input */
    input[type="number"], select, textarea {
        font-size: 16px !important;
    }
</style>
{% endblock %}
