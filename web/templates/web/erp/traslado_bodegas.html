{% extends 'web/base.html' %}
{% load static %}

{% block content %}
<style>
    :root {
        --pm-bg: #0d1117;
        --pm-surface: #161b22;
        --pm-border: #30363d;
        --pm-text: #f0f6fc;
        --pm-info: #388bfd;
    }
    body { background-color: var(--pm-bg) !important; color: var(--pm-text) !important; }
    
    .card-traslado {
        background: var(--pm-surface);
        border: 1px solid var(--pm-border);
        border-top: 4px solid var(--pm-info);
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .form-control, .form-select {
        background-color: #010409 !important;
        border: 1px solid var(--pm-border) !important;
        color: #ffffff !important;
        border-radius: 8px;
        padding: 12px;
    }
    .form-control:focus, .form-select:focus {
        border-color: var(--pm-info) !important;
        box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.15) !important;
    }
</style>

<div class="container py-4 py-md-5" style="margin-top: 80px;">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5"> 
            
            <a href="{% url 'inventario_actual' %}" class="text-decoration-none text-muted mb-3 d-inline-block fw-bold small transition-2s hover-white">
                <i class="bi bi-arrow-left me-1"></i> Volver al Inventario
            </a>

            <div class="card card-traslado">
                <div class="card-header border-bottom border-secondary p-4 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 text-white fw-bold"><i class="bi bi-truck text-info me-2"></i> Trasladar Material</h5>
                </div>

                <div class="card-body p-4">
                    <!-- Info del Material -->
                    <div class="p-3 mb-4 rounded-3 border" style="background: rgba(255,255,255,0.03); border-color: var(--pm-border)!important;">
                        <div class="text-muted small fw-bold">ÍTEM A TRASLADAR</div>
                        <div class="fw-bold text-white fs-5">{{ material.nombre }}</div>
                        <div class="text-info small fw-bold">Total Global: {{ material.stock_actual|floatformat:"0" }} {{ material.unidad_medida }}</div>
                    </div>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="row g-3 mb-3">
                            <div class="col-12">
                                <label class="text-muted small fw-bold text-uppercase mb-2">Bodega de Origen (Extraer de) <span class="text-danger">*</span></label>
                                <select name="bodega_origen" class="form-select" required>
                                    <option value="" disabled selected>Selecciona de dónde sale...</option>
                                    {% for stock in material.stocks_bodegas.all %}
                                        {% if stock.cantidad > 0 %}
                                            <option value="{{ stock.bodega.id }}">{{ stock.bodega.nombre }} (Disponible: {{ stock.cantidad|floatformat:"0" }})</option>
                                        {% endif %}
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="text-muted small fw-bold text-uppercase mb-2">Bodega de Destino (Enviar a) <span class="text-danger">*</span></label>
                                <select name="bodega_destino" class="form-select" required>
                                    <option value="" disabled selected>Selecciona a dónde va...</option>
                                    {% for bodega in bodegas %}
                                        <option value="{{ bodega.id }}">{{ bodega.nombre }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="text-muted small fw-bold text-uppercase mb-2">Cantidad a Trasladar <span class="text-danger">*</span></label>
                            <input type="number" name="cantidad" class="form-control text-center fw-bold fs-4 text-white" min="0.01" step="0.01" required placeholder="0">
                        </div>

                        <div class="mb-4">
                            <label class="text-muted small fw-bold text-uppercase mb-2">Motivo / Transporte</label>
                            <input type="text" name="observaciones" class="form-control" placeholder="Ej: Envío en camión placa ABC-123 a Obra Norte">
                        </div>

                        <div class="d-grid mt-2">
                            <button type="submit" class="btn btn-info py-3 fw-bold rounded-3 text-dark shadow-sm" onclick="return confirm('¿Confirmas el traslado de este material?');">
                                <i class="bi bi-send-check-fill me-1"></i> Confirmar Traslado
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
